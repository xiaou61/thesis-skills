interface:
  display_name: "论文标准化"
  short_description: "基于真实程序生成本科系统类论文"
  default_prompt: "Use $thesis-standardizer to generate an undergraduate system-design thesis from a real program. First extract school template rules if a .docx template exists, then build project evidence from the source code, fill standard-profile.yaml, thesis-ai-spec.yaml, and figure-registry.yaml, build a Chapter 3-5 figure and screenshot plan, draft chapters 1-6 from evidence, generate required Visio use-case/business-flow/requirement-structure/function-architecture/overall-architecture/deployment/ER/key-module-flow diagrams and database or clearly labeled data-object three-line tables, keep editable sources registered, register Chapter 5 real screenshots or needs_user_screenshot placeholders, and list missing evidence instead of inventing facts."
policy:
  allow_implicit_invocation: true
