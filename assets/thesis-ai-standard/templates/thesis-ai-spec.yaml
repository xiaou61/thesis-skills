schema_version: "2.0"
language: "zh-CN"
encoding: "utf-8"

paper:
  title: "填写论文题目"
  type: "本科毕业论文/毕业设计"
  type_profile: "system_design"
  school: "填写学校名称"
  college: "填写学院名称"
  major: "填写专业名称"
  author: "填写作者"
  advisor: "填写导师"
  submission_date: "YYYY-MM-DD"

project:
  name: "填写系统或项目名称"
  domain: "填写系统应用领域"
  problem_statement: "填写系统要解决的问题"
  objectives:
    - "目标1"
    - "目标2"
  scope:
    included:
      - "本论文实际覆盖的功能或模块"
    excluded:
      - "明确不覆盖或不承诺的内容"

implementation_sources:
  code_repository: "填写代码路径或 not_applicable"
  database_schema: "填写数据库结构材料路径或 not_applicable"
  api_docs: "填写接口材料路径或 not_applicable"
  screenshots: "填写截图目录或 not_applicable"
  test_reports: "填写测试材料路径或 not_applicable"

figure_plan:
  status: "not_started | planned | partially_generated | complete"
  source_file: "paper-context/figure-plan/figure-plan.yaml"
  policy:
    normal_system_thesis_min_figures: 8
    default_chapter_count: 6
    structural_diagrams_need_editable_source: true
    chapter5_is_implementation: true
    chapter5_screenshots_must_be_real: true
    chapter6_is_testing: true
    standalone_conclusion_chapter: "only_if_school_template_or_user_requires"
    missing_screenshot_status: "needs_user_screenshot"

roles:
  - name: "角色名称"
    description: "说明其在系统中的作用"
    evidence: "材料路径或说明"

technology_stack:
  frontend: []
  backend: []
  database: []
  tools: []
  external_services: []
  notes: "只填写项目真实使用的技术"

functional_modules:
  - name: "模块名称"
    description: "模块功能说明"
    evidence:
      - "代码、截图、接口或测试材料路径"

database_design:
  evidence_status: "missing | partial | confirmed"
  source_files:
    - "schema/entity/migration/SQL/table screenshot path"
  entities:
    - name: "实体名称"
      table: "表名"
      purpose: "说明该实体/表的用途"
      evidence: "schema/entity/migration 路径"
      fields:
        - name: "字段名"
          type: "字段类型"
          key: false
          nullable: "true | false | 未说明"
          description: "字段说明"
          evidence: "字段来源路径或说明"
  relationships:
    - name: "关系名称"
      from: "源实体 id 或表名"
      to: "目标实体 id 或表名"
      fromCardinality: "1"
      toCardinality: "m"
      evidence: "关系来源路径或说明"

chapters:
  - id: "chapter-1"
    title: "绪论"
    purpose: "说明背景、意义、研究现状、研究内容和论文结构。"
    required_sections:
      - "研究背景"
      - "研究目的与意义"
      - "国内外研究现状或相关工作"
      - "研究内容"
      - "论文结构安排"
    evidence_required:
      - "任务书或选题依据"
      - "参考文献"

  - id: "chapter-2"
    title: "相关技术及其在系统中的应用"
    purpose: "解释项目真实使用的技术，并说明其在本系统中的作用。"
    required_sections:
      - "前端相关技术"
      - "后端相关技术"
      - "数据库相关技术"
      - "开发与运行环境"
    evidence_required:
      - "项目依赖文件"
      - "技术栈证据"
      - "参考文献"

  - id: "chapter-3"
    title: "系统分析"
    purpose: "说明可行性、用户角色、功能需求和非功能需求。"
    required_sections:
      - "可行性分析"
      - "用户角色分析"
      - "功能需求分析"
      - "非功能需求分析"
      - "用例分析"
    evidence_required:
      - "功能材料、角色材料、源码或截图"
    recommended_outputs:
      figures:
        - "Visio 用例图"
        - "Visio 核心业务流程图（有业务流程证据时）"
        - "Visio 功能需求结构图（有模块证据时）"

  - id: "chapter-4"
    title: "系统设计"
    purpose: "说明系统总体设计、功能结构、数据库或数据对象设计、架构与模块设计。"
    required_sections:
      - "系统总体设计"
      - "系统功能结构设计"
      - "数据库概念结构设计"
      - "数据库表设计"
      - "关键模块设计"
    evidence_required:
      - "源码、数据库结构、接口或设计材料"
    recommended_outputs:
      figures:
        - "Visio 功能架构图"
        - "Visio 总体架构图"
        - "Visio 技术/部署结构图（有部署或技术栈证据时）"
        - "Visio E-R 总图"
        - "Visio 单实体 E-R 图（核心实体逐个生成）"
      tables:
        - "数据库三线表（每个论文范围内的数据表逐个生成）"

  - id: "chapter-5"
    title: "系统实现"
    purpose: "说明关键模块实现、核心业务处理流程和程序运行界面。"
    required_sections:
      - "实现环境"
      - "关键模块实现"
      - "核心功能运行效果"
      - "实现结果说明"
    evidence_required:
      - "源码、接口、运行截图、命令日志或程序页面"
    recommended_outputs:
      figures:
        - "Visio 关键模块处理流程图（选取2-4个核心模块）"
        - "真实程序截图（登录/入口、首页、核心功能）"
        - "截图缺失时登记 needs_user_screenshot 占位，不得伪造截图"

  - id: "chapter-6"
    title: "系统测试"
    purpose: "说明测试环境、测试用例和测试结果；若学校模板不要求单独结论章，则在本章末尾总结完成工作、不足与后续展望。"
    required_sections:
      - "测试环境"
      - "测试方法"
      - "测试用例"
      - "测试结果分析"
      - "本章小结或总结与展望（无独立结论章时）"
    evidence_required:
      - "测试用例、日志、截图或报告"
    recommended_outputs:
      figures:
        - "真实测试结果截图、运行日志截图或报告截图（有证据时）"
      tables:
        - "测试环境表"
        - "测试用例三线表"

  - id: "optional-chapter-7"
    title: "结论与展望"
    optional: true
    include_when: "学校模板、导师或用户明确要求独立结论章时才生成"
    purpose: "总结实际完成内容、不足与后续工作。"
    required_sections:
      - "工作总结"
      - "不足之处"
      - "未来展望"
    evidence_required:
      - "全文已出现的结果和证据"

evidence_index:
  template_profile: "paper-context/template-extract/template-profile.json"
  template_rule_overrides: "paper-context/template-extract/template-rule-overrides.yaml"
  project_evidence: "paper-context/evidence/project-evidence.json"
  code_structure: "paper-context/evidence/code-structure.md"
  tech_stack: "paper-context/evidence/tech-stack.md"
  database_schema: "paper-context/evidence/database-schema.md"
  api_list: "paper-context/evidence/api-list.md"
  test_results: "paper-context/evidence/test-results.md"

rules:
  must_not_fabricate:
    - "系统功能"
    - "接口路径"
    - "数据库字段"
    - "测试结果"
    - "截图来源"
    - "参考文献"
    - "学校要求"
  must_check:
    - "学校模板优先级"
    - "章节层级"
    - "图表编号"
    - "术语一致性"
    - "证据链完整性"
