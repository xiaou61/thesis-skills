schema_version: "1.0"
language: "zh-CN"
encoding: "utf-8"

purpose: "记录论文文本 AIGC 率估计、五维评分、段落风险和复测结果"

policy:
  objective: "用本地启发式报告辅助定位高风险段落和修改优先级"
  not_objective:
    - "替代学校或第三方平台检测"
    - "承诺通过检测或达到某个官方比例"
    - "把估计值当作学术诚信结论"

inputs:
  draft_file: "填写待检测正文路径"
  local_report_md: "paper-context/aigc/aigc-detection-report.md"
  local_report_json: "paper-context/aigc/aigc-detection-report.json"
  style_report_md: "paper-context/aigc/aigc-style-report.md"

detection_method:
  source_inspiration: "free-revalution/AIGC-Detector-Pro"
  local_script: "scripts/detect_aigc_rate.py"
  score_type: "heuristic_estimated_aigc_rate"
  dimensions:
    sentence_regularity:
      label: "句式规整度"
      weight: 0.25
      notes: "句长均匀、模板起笔、连续句首重复"
    connector_density:
      label: "逻辑词密度"
      weight: 0.20
      notes: "首先/其次/综上所述/值得注意的是等连接词过密"
    voice_characteristics:
      label: "语态特征"
      weight: 0.15
      notes: "被动语态、抽象分析壳、非人称表达"
    vocabulary_diversity:
      label: "词汇多样性"
      weight: 0.15
      notes: "泛化词、高频重复词、低词汇变化"
    argumentation_depth:
      label: "论证深度"
      weight: 0.25
      notes: "缺少数据、引用、图表、实验、案例、限制条件"

review_workflow:
  - step: "初测"
    status: "pending | done | skipped"
    notes: "生成 aigc-detection-report.md/json"
  - step: "风格定位"
    status: "pending | done | skipped"
    notes: "结合 aigc-style-report.md 定位具体套话和证据缺口"
  - step: "定向修改"
    status: "pending | done | skipped"
    notes: "优先改 high/medium 段落，不新增未核验证据"
  - step: "复测"
    status: "pending | done | skipped"
    notes: "比较估计 AIGC 率、五维评分和高风险段落数量"

comparison_log:
  before:
    estimated_aigc_rate: null
    overall_risk: ""
    high_risk_paragraphs: null
    medium_risk_paragraphs: null
  after:
    estimated_aigc_rate: null
    overall_risk: ""
    high_risk_paragraphs: null
    medium_risk_paragraphs: null
  notes: "填写变化原因和仍需人工复核的位置"

final_checks:
  - "已声明该结果不是官方检测分数"
  - "未把估计值写成学校检测结果"
  - "复测只用于修改优先级和趋势比较"
  - "修改没有新增虚构来源、数据或项目事实"
